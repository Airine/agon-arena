apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agon-arena.fullname" . }}-worker
  labels:
    {{- include "agon-arena.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "agon-arena.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "agon-arena.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: {{ include "agon-arena.apiImage" . | quote }}
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          command:
            - node
            - apps/api/dist/worker.js
          env:
            {{- include "agon-arena.apiEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
