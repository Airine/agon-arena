{{- if .Values.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.tls.secretName }}
  labels:
    {{- include "agon-arena.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.tls.secretName }}
  issuerRef:
    name: {{ .Values.tls.clusterIssuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.hosts.primary | quote }}
    {{- range .Values.hosts.aliases }}
    - {{ . | quote }}
    {{- end }}
    {{- if .Values.hosts.api }}
    - {{ .Values.hosts.api | quote }}
    {{- end }}
{{- end }}
