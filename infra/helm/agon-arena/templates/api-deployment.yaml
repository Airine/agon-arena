apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agon-arena.fullname" . }}-api
  labels:
    {{- include "agon-arena.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "agon-arena.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "agon-arena.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- if .Values.api.migrations.enabled }}
      initContainers:
        {{- if .Values.api.migrations.waitForPostgresql }}
        - name: wait-for-postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          command:
            - sh
            - -c
            - until pg_isready -h {{ include "agon-arena.postgresqlHost" . }} -p 5432 -U {{ .Values.postgresql.username }}; do sleep 2; done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "agon-arena.postgresqlSecretName" . }}
                  key: {{ .Values.postgresql.passwordSecretKey }}
        {{- end }}
        - name: migrate
          image: {{ include "agon-arena.apiImage" . | quote }}
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          workingDir: /app/apps/api
          command:
            - node
            - dist/db/migrate.js
          env:
            {{- include "agon-arena.apiEnv" . | nindent 12 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "agon-arena.apiImage" . | quote }}
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          env:
            {{- include "agon-arena.apiEnv" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
