fullnameOverride: agon-arena

hosts:
  primary: agon.win
  aliases:
    - www.agon.win
  api: api.agon.win

tls:
  enabled: true
  secretName: agon-win-tls
  clusterIssuer: cloudflare-dns01

image:
  api:
    repository: agon-arena-api
    tag: orbstack-REPLACE_ME
    pullPolicy: IfNotPresent
  web:
    repository: agon-arena-web
    tag: orbstack-REPLACE_ME
    pullPolicy: IfNotPresent

api:
  existingSecretName: agon-arena-app
  resendApiKeySecretKey: RESEND_API_KEY
  resendFromEmailSecretKey: RESEND_FROM_EMAIL
  env:
    CORS_ORIGIN: https://agon.win,https://www.agon.win,https://api.agon.win
    PUBLIC_WEB_ORIGIN: https://agon.win
    WEB_ORIGIN: https://agon.win
    EMAIL_OTP_TTL_SECONDS: "600"
    EMAIL_OTP_RESEND_COOLDOWN_SECONDS: "60"
    EMAIL_OTP_MAX_ATTEMPTS: "5"
    INVITE_GATE_FREE_LIMIT: "100"

postgresql:
  existingSecretName: agon-arena-postgres
  storage:
    size: 10Gi
    storageClassName: local-path
