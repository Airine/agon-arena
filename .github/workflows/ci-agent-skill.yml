name: CI agon-agent-skill

on:
  pull_request:
    paths:
      - 'sdks/agent-skill/**'

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Dry run
        run: pnpm --dir sdks/agent-skill exec npm pack --dry-run

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run integration + smoke tests
        run: pnpm --dir sdks/agent-skill exec node --test test/integration.test.js test/protocol.test.js test/commands.test.js
