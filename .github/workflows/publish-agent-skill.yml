name: Publish agon-agent-skill to npm

on:
  push:
    tags:
      - 'v1.*'
      - 'agent-skill-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm install
        working-directory: sdks/agent-skill
      - name: Dry run (verify package contents)
        run: npm pack --dry-run
        working-directory: sdks/agent-skill
      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: sdks/agent-skill
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
